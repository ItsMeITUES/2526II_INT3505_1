openapi: 3.0.0
info:
  title: Book Management System API
  description: API for managing books in a library system
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v3
    description: Local Development Server

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Missing field(s) or user already exists

  /auth/login:
    post:
      summary: Authenticate a user and obtain a JWT token
      requestBody:
        description: User credentials for authentication
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
      responses:
        '200':
          description: Authentication successful, returns JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Unregistered user or Wrong password
        '400':
          description: Missing username or password

  /books:
    get:
      summary: Get a list of all books
      parameters:

        - in: query
          name: id
          schema:
            type: integer
          description: The ID of the book to retrieve
        - in: query
          name: title
          schema:
            type: string
          description: The title of the book to retrieve
        - in: query
          name: author
          schema:
            type: string
          description: The author of the book(s) to retrieve
    
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      summary: Add a new book
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Book'
          application/xml:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        '201':
          description: Book created successfully
        '400':
          description: Missing field(s)
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /books/{id}:
    get:
      summary: Get details of a specific book by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Details of the book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
          
    put:
      summary: Update all details of a specific book by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        '200':
          description: Book updated successfully
        '404':
          description: Book not found
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    patch:
      summary: Partially update details of a specific book by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        '200':
          description: Book updated successfully
        '404':
          description: Book not found
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

    delete:
      summary: Delete a specific book by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book deleted successfully
        '404':
          description: Book not found
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

components:
  schemas:
    Book:
      type: object
      required:
        - title
        - author
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "whatever the title of the book is"
        author:
          type: string
          example: "whatever the author of the book is"

    UserAuth:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "newuser"
        password:
          type: string
          example: "password123"

    Token:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOi"

  responses:
    UnauthorizedResponse:
      description: Expired, Invalid or missing authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No Token received."

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT